<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number One Transport - From 1 Gram to 30 Tons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="flag">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 600'%3E%3Cpath fill='%23002395' d='M0 0h900v600H0z'/%3E%3Cpath fill='%23FFF' d='M300 0h600v600H300z'/%3E%3Cpath fill='%23ED2939' d='M600 0h300v600H600z'/%3E%3C/svg%3E" alt="France">
            </div>
            <div class="logo">
                <img src="logo_01.png" alt="Number One Transport">
            </div>
            <button class="menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-bg"></div>
            <div class="hero-content">
                <h1 class="hero-title">
                    <span class="text-white">From</span>
                    <span class="text-green"> 1 </span>
                    <span class="text-white">gram </span>
                    <span class="text-white-large">to </span>
                    <span class="text-green-large">30</span>
                    <span class="text-white-large"> tons</span>
                </h1>
                <div class="hero-line"></div>
                <p class="hero-subtitle">Reliable and efficient<br>transport solutions</p>
            </div>
        </section>

        <!-- CTA Section -->
        <section class="cta-section">
            <div class="cta-info-box">
                <p>Besoin d'une solution rapide ?</p>
            </div>
            <div class="cta-buttons">
                <a href="#" class="btn btn-primary">
                    Faire un devis
                    <svg class="btn-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M6 12L10 8L6 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
                <a href="#" class="btn btn-secondary">
                    Nous contacter
                    <svg class="btn-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M6 12L10 8L6 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
            </div>
        </section>

        <!-- Person Illustration -->
        <div class="person-section">
            <img src="perso_acceuil.png" alt="Delivery person" class="person-img">
        </div>

        <!-- Packages Illustration -->
        <div class="packages-section">
            <img src="colis.png" alt="Packages" class="packages-img">
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-shadow-left"></div>
            <div class="footer-shadow-right"></div>
        </footer>
    </div>
</body>
</html>
